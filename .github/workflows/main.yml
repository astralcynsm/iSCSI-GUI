on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0Beta)"
        required: true
        default: "v1.0.0Beta"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install squashfs-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools

      - name: Build raw
        run: |
          chmod +x scripts/build-raw.sh
          make build-raw
          ls -lh iscsi_gui.raw

      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: false
          draft: false
          make_latest: true
          files: |
            iscsi_gui.raw
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
